project:
  type: book
  output-dir: docs

book:
  title: "Spatial Analysis for Environmental Science"
  subtitle: "Course Notes"
  author: "Andy Bunn"
  date: today
  description: "Spatial analysis notes and exercises"
  navbar:
    background: dark
    search: true
  chapters:
    - file: index.qmd
      text: "Cover"
    - part: "Foundations"
      chapters:
        - 00Welcome.qmd
        - 01GettingStarted.qmd
        - 01xAsideMethodsAndGenerics.qmd
        - 02MtBakerMap.qmd
    - part: "Point Patterns & Autocorrelation"
      chapters:
        - 03Point_Patterns.qmd
        - 03xAsideDistanceMatrices.qmd
        - 04Intro2Autocorrelation.qmd
        - 04xAsideCorrelationVersusRegression.qmd
    - part: "Interpolation & Geostatistics"
      chapters:
        - 05aGeostatsIDW.qmd
        - 05bGeostat2TPS.qmd
        - 06aGeostatsKriging.qmd
        - 06xAsideGeostatsKrigingVariance.qmd
        - 06bGeostatsRegressionKriging.qmd
    - part: "Regression"
      chapters:
        - 07RegressionGLS.qmd
        - 07xAsideOLS-Algebra-Matrix.qmd
    - 08PackagesUsed.qmd
  repo-url: https://github.com/AndyBunn/spatialNotes
  repo-actions: [edit, issue]

bibliography:
  - packages.bib
  - other.bib

reference-location: document

format:
  html:
    theme: cosmo
    css: custom.css
    code-fold: show
    toc: true
    toc-depth: 4
    number-sections: false

execute:
  warning: false
  message: false
  freeze: auto